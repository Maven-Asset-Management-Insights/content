<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} | {{ site.title }}</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  </head>

  <body>

    <!-- Site Header -->
    <header class="site-header">
      <div class="container header-inner">

        <!-- Maven Logo -->
        <a class="brand" href="{{ "/" | relative_url }}">
          <img
            src="{{ "/assets/img/MavenAsset_Logo.png" | relative_url }}"
            alt="Maven Asset Management Solutions logo"
            class="brand-logo"
          />
        </a>

        <!-- Navigation -->
     <nav class="nav">
  <a href="{{ "/" | relative_url }}">Home</a>
  <a href="{{ "/maven-insights" | relative_url }}">Monthly Insights</a>
  <a href="{{ "/glossary" | relative_url }}">Glossary</a>
  <a href="{{ "/field-kits" | relative_url }}">Field Kits</a>
  <a href="{{ "/search/" | relative_url }}">Search</a>
  <a class="cta" href="https://www.mavenasset.com/learn/blog/" target="_blank" rel="noopener">
  Maven Blog
   </a>
  <a class="cta" href="https://www.mavenasset.com" target="_blank" rel="noopener">
    About Maven
  </a>
       <a class="email-btn" href="mailto:mas@mavenasset.com">
  Email Maven
</a>
</nav>

      </div>
    </header>

    <!-- Page Content -->
    <main class="container">
      {{ content }}
    </main>

    <!-- Footer -->
<footer class="site-footer">
  <div class="container footer-inner">

    <div class="footer-left">
      © {{ site.time | date: "%Y" }} Maven Asset Management Solutions
    </div>

    <div class="footer-social">
      <a href="https://www.linkedin.com/company/maven-asset-management" target="_blank" aria-label="LinkedIn">
        <!-- LinkedIn SVG -->
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M4.98 3.5C4.98 4.88 3.86 6 2.48 6S0 4.88 0 3.5 1.12 1 2.48 1 4.98 2.12 4.98 3.5zM.5 8h4v15h-4V8zm7 0h3.8v2h.05c.53-1 1.82-2.05 3.75-2.05 4.01 0 4.75 2.64 4.75 6.08V23h-4v-7.5c0-1.79-.03-4.1-2.5-4.1-2.5 0-2.88 1.95-2.88 3.97V23h-4V8z"/>
        </svg>
      </a>

      <a href="https://twitter.com/" target="_blank" aria-label="Twitter">
        <!-- X / Twitter SVG -->
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2H21.5l-7.25 8.29L22 22h-6.83l-5.34-6.99L3.5 22H.244l7.75-8.86L2 2h6.97l4.84 6.4L18.244 2z"/>
        </svg>
      </a>
    </div>

  </div>
</footer>

  </body>
</html>
