<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} | {{ site.title }}</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  </head>

  <body>

    <!-- Site Header -->
    <header class="site-header">
      <div class="container header-inner">

        <!-- Maven Logo -->
        <a class="brand" href="{{ "/" | relative_url }}">
          <img
            src="{{ "/assets/img/MavenAsset_Logo.png" | relative_url }}"
            alt="Maven Asset Management Solutions logo"
            class="brand-logo"
          />
        </a>

        <!-- Navigation -->
     <nav class="nav">
  <a href="{{ "/" | relative_url }}">Home</a>
  <a href="{{ "/maven-insights" | relative_url }}">Monthly Insights</a>
  <a href="{{ "/glossary" | relative_url }}">Glossary</a>
  <a href="{{ "/field-kits" | relative_url }}">Field Kits</a>
  <a href="{{ "/search/" | relative_url }}">Search</a>
  <a class="cta" href="https://www.mavenasset.com/learn/blog/" target="_blank" rel="noopener">
  Maven Blog
   </a>
  <a class="cta" href="https://www.mavenasset.com" target="_blank" rel="noopener">
    About Maven
  </a>
       <a class="email-btn" href="mailto:mas@mavenasset.com">
  Email Maven
</a>
</nav>

      </div>
    </header>

    <!-- Page Content -->
    <main class="container">
      {{ content }}
    </main>

    <!-- Footer -->
<footer class="site-footer">
  <div class="container footer-inner">

    <div class="footer-left">
      © {{ site.time | date: "%Y" }} Maven Asset Management Solutions
    </div>

    <div class="footer-social">

      <!-- LinkedIn -->
      <a href="https://www.linkedin.com/company/maven-asset-management"
         target="_blank"
         aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M4.98 3.5C4.98 4.88 3.86 6 2.48 6S0 4.88 0 3.5 1.12 1 2.48 1 4.98 2.12 4.98 3.5zM.5 8h4v15h-4V8zm7 0h3.8v2h.05c.53-1 1.82-2.05 3.75-2.05 4.01 0 4.75 2.64 4.75 6.08V23h-4v-7.5c0-1.79-.03-4.1-2.5-4.1-2.5 0-2.88 1.95-2.88 3.97V23h-4V8z"/>
        </svg>
      </a>

      <!-- YouTube -->
      <a href="https://www.youtube.com/@mavenasset"
         target="_blank"
         aria-label="YouTube">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.4 31.4 0 0 0 0 12a31.4 31.4 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.4 31.4 0 0 0 24 12a31.4 31.4 0 0 0-.5-5.8zM9.75 15.5v-7l6 3.5-6 3.5z"/>
        </svg>
      </a>

      <!-- Facebook -->
      <a href="https://www.facebook.com/mavenasset/"
         target="_blank"
         aria-label="Facebook">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M22 12a10 10 0 1 0-11.6 9.9v-7h-2.8v-2.9h2.8V9.4c0-2.8 1.7-4.4 4.2-4.4 1.2 0 2.4.2 2.4.2v2.6h-1.4c-1.4 0-1.8.9-1.8 1.8v2.2h3.1l-.5 2.9h-2.6v7A10 10 0 0 0 22 12z"/>
        </svg>
      </a>

    </div>

  </div>
</footer>

  </body>
</html>
